    // ==================== State Management ====================
    const state = {
      currentScene: 'work', // 'work' or 'life'
      tasks: [],
      currentView: 'calendar',
      currentMonth: new Date(),
      selectedTaskId: null,
      selectedDate: null,
      modalSubtasks: [], // Store subtasks being added in modal
      listSubtasksExpanded: true, // 列表页子任务展开状态
      listTagFilter: '' // 列表页标签筛选
    };

    // Local Storage

    function switchScene(scene) {
      if (state.currentScene === scene) return;
      
      // Save current scene tasks
      saveTasksLocal();
      
      // Switch scene
      state.currentScene = scene;
      localStorage.setItem('todomaster_scene', scene);
      
      // Update UI
      document.querySelectorAll('.scene-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.scene === scene);
      });
      
      // Apply theme
      applySceneTheme(scene);
      
      // Load new scene tasks
      loadTasksLocal();
      
      // Re-setup Supabase data load for new scene
      if (supabaseClient) {
        loadTasksFromSupabase();
      }
      
      render();
    }

    function applySceneTheme(scene) {
      const root = document.documentElement;
      if (scene === 'life') {
        root.style.setProperty('--primary', '#f472b6');
        root.style.setProperty('--primary-dark', '#db2777');
        root.style.setProperty('--accent', '#fb923c');
        root.style.setProperty('--accent-light', '#fdba74');
        root.style.setProperty('--bg-hover', '#fdf2f8');
        root.style.setProperty('--bg-primary', '#fffbfc');
        root.style.setProperty('--border', '#fce7f3');
        root.style.setProperty('--border-light', '#fdf2f8');
      } else {
        root.style.setProperty('--primary', '#7c3aed');
        root.style.setProperty('--primary-dark', '#4f46e5');
        root.style.setProperty('--accent', '#8b5cf6');
        root.style.setProperty('--accent-light', '#a78bfa');
        root.style.setProperty('--bg-hover', '#f5f3ff');
        root.style.setProperty('--bg-primary', '#fafafa');
        root.style.setProperty('--border', '#e5e7eb');
        root.style.setProperty('--border-light', '#f3f4f6');
      }
    }

    function loadTasksLocal() {
      try {
        const key = 'todomaster_tasks_' + state.currentScene;
        const data = localStorage.getItem(key);
        if (data) {
          state.tasks = JSON.parse(data);
        } else {
          state.tasks = [];
        }
      } catch (e) {
        console.error('Failed to load local tasks:', e);
        state.tasks = [];
      }
    }

    function saveTasksLocal() {
      try {
        const key = 'todomaster_tasks_' + state.currentScene;
        localStorage.setItem(key, JSON.stringify(state.tasks));
      } catch (e) {
        console.error('Failed to save local tasks:', e);
      }
    }

    // Generate UUID
    function generateId() {
      if (crypto.randomUUID) {
        return crypto.randomUUID();
      }
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        const v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    }

    // ==================== Supabase Operations ====================
    async function saveTaskToSupabase(task) {
      if (!supabaseClient || !currentUser) {
        addDebugLog('saveTaskToSupabase: 未登录，添加到待同步队列');
        addToPendingSync(task);
        return;
      }

      addDebugLog('保存任务: ' + task.id + ', 场景: ' + state.currentScene);

      // 先保存到本地，确保数据不会丢失
      saveTasksLocal();

      // 设置超时 Promise - 10秒超时，更快反馈
      const timeoutPromise = new Promise((_, reject) => {
        setTimeout(() => reject(new Error('保存超时（10秒）')), 10000);
      });

      try {
        const taskData = {
          id: task.id,
          user_id: currentUser.id,
          title: task.content || task.title,
          completed: task.completed || false,
          dueDate: task.dueDate || '',
          dueTime: task.dueTime || '',
          priority: task.priority || 'normal',
          tag: task.tag || '',
          subtasks: task.subtasks || [],
          completedAt: task.completedAt || null,
          postponeCount: task.postponeCount || 0,
          postponeHistory: task.postponeHistory || [],
          createdAt: task.createdAt || Date.now()
        };

        addDebugLog('准备保存数据...');

        const savePromise = supabaseClient
          .from('tasks_' + state.currentScene)
          .upsert(taskData);

        // 使用 Promise.race 实现超时
        const { data, error } = await Promise.race([savePromise, timeoutPromise]);

        if (error) throw error;

        addDebugLog('✓ 任务保存成功');
        saveLastSyncTime();
        // 如果之前在待同步队列，移除它
        removeFromPendingSync(task.id);
      } catch (error) {
        console.error('Failed to save to Supabase:', error);
        addDebugLog('✗ 保存失败: ' + error.message + '，已缓存到本地待同步');
        addToPendingSync(task);
        // 显示提示给用户
        showToast('网络异常，任务已保存到本地，稍后自动同步');
      }
    }

    async function deleteTaskFromSupabase(taskId) {
      if (!supabaseClient || !currentUser) return;
      try {
        addDebugLog('删除任务: ' + taskId + ', 场景: ' + state.currentScene);
        const { data, error } = await supabaseClient
          .from('tasks_' + state.currentScene)
          .delete()
          .eq('id', taskId)
          .eq('user_id', currentUser.id);
        addDebugLog('删除结果: ' + (error ? '错误 - ' + error.message : '成功'));
        if (error) throw error;
      } catch (error) {
        console.error('Failed to delete from Supabase:', error);
        addDebugLog('删除异常: ' + error.message);
      }
    }

    // ==================== Date Utilities ====================
    function formatDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function formatDateLocale(dateStr) {
      const date = new Date(dateStr);
      return `${date.getMonth() + 1}月${date.getDate()}日`;
    }

    function formatTime(time) {
      if (!time) return '';
      return time;
    }

    function isToday(dateStr) {
      return dateStr === formatDate(new Date());
    }

    function isOverdue(dateStr, timeStr) {
      const now = new Date();
      const dueDate = new Date(dateStr);
      if (timeStr) {
        const [hours, minutes] = timeStr.split(':');
        dueDate.setHours(parseInt(hours), parseInt(minutes));
      } else {
        dueDate.setHours(23, 59, 59);
      }
      return dueDate < now;
    }

    function isTodayOrBefore(dateStr) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const date = new Date(dateStr);
      return date <= today;
    }

    function getDaysInMonth(year, month) {
      return new Date(year, month + 1, 0).getDate();
    }

    function getFirstDayOfMonth(year, month) {
      return new Date(year, month, 1).getDay();
    }

    // ==================== Task Operations ====================

    // Update tag suggestions datalist from existing tags
    function updateTagSuggestions() {
      const tags = new Set();
      state.tasks.forEach(t => {
        if (t.tag) tags.add(t.tag);
      });
      const datalist = document.getElementById('tagSuggestions');
      if (datalist) {
        datalist.innerHTML = [...tags].map(tag => `<option value="${escapeHtml(tag)}">`).join('');
      }
    }

    // Filter completed tasks by tag
    function filterCompletedByTag(btn, tag) {
      // Update active button
      document.querySelectorAll('.tag-filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      // Filter tasks in completed container
      const container = document.querySelector('.completed-tasks-container');

      container.querySelectorAll('.list-task').forEach(taskEl => {
        if (!tag) {
          taskEl.style.display = '';
        } else {

    // 一键展开/收起所有子任务
    function toggleAllSubtasks() {
      state.listSubtasksExpanded = !state.listSubtasksExpanded;
      const sections = document.querySelectorAll('#listView .subtasks-section');
      sections.forEach(el => {
        if (state.listSubtasksExpanded) {
          el.classList.remove('hidden');
        } else {
          el.classList.add('hidden');
        }
      });

    // 按标签筛选列表
    function filterListByTag(tag) {
      state.listTagFilter = tag;
      renderList();
    }

    function addTask(content, dueDate, dueTime, subtasks = [], priority = 'normal', tag = '') {
      const task = {
        id: generateId(),
        content,
        dueDate,
        dueTime: dueTime || '',
        completed: false,
        completedAt: null,
        createdAt: Date.now(),
        postponeCount: 0,
        postponeHistory: [],
        subtasks: subtasks,
        priority: priority,
        tag: tag
      };
      state.tasks.push(task);
      saveTasksLocal();
      saveTaskToSupabase(task);
      render();
    }

    function updateTask(id, content, dueDate, dueTime, subtasks, priority, tag = '') {
      const task = state.tasks.find(t => t.id === id);
      if (task) {
        task.content = content;
        task.dueDate = dueDate;
        task.dueTime = dueTime || '';
        task.subtasks = subtasks || [];
        task.priority = priority || 'normal';
        task.tag = tag;
        saveTasksLocal();
        saveTaskToSupabase(task);
        render();
      }
    }

    function deleteTask(id) {
      state.tasks = state.tasks.filter(t => t.id !== id);
      saveTasksLocal();
      deleteTaskFromSupabase(id);
      render();
    }

    function toggleTaskComplete(id) {
      const task = state.tasks.find(t => t.id === id);
      if (task) {
        task.completed = !task.completed;
        task.completedAt = task.completed ? Date.now() : null;
        saveTasksLocal();
        saveTaskToSupabase(task);
        render();
        // Re-render day detail modal if open
        const dayDetailModal = document.getElementById('dayDetailModal');
        if (dayDetailModal && !dayDetailModal.classList.contains('hidden')) {
          const currentDate = state.selectedDate;
          if (currentDate) {
            openDayDetailModal(currentDate);
          }
        }
      }
    }

    function postponeTask(id, newDate) {
      const task = state.tasks.find(t => t.id === id);
      if (task) {
        task.postponeHistory.push({
          date: task.dueDate,
          newDate: newDate,
          postponedAt: Date.now()
        });
        task.dueDate = newDate;
        task.postponeCount++;
        saveTasksLocal();
        saveTaskToSupabase(task);
        render();
      }
    }

    // ==================== Subtask Operations ====================
    function addSubtask(taskId, content, dueDate, priority = 'normal') {
      const task = state.tasks.find(t => t.id === taskId);
      if (task) {
        task.subtasks.push({
          id: generateId(),
          content,
          completed: false,
          dueDate: dueDate || '',
          priority: priority // 'urgent-important', 'urgent', 'important', 'normal'
        });
        saveTasksLocal();
        saveTaskToSupabase(task);
        // Only re-render the subtask section, not the whole page
        renderSubtaskSection(taskId);
        // Also re-render day detail modal if open
        const dayDetailModal = document.getElementById('dayDetailModal');
        if (dayDetailModal && !dayDetailModal.classList.contains('hidden')) {
          const currentDate = state.selectedDate;
          if (currentDate) {
            openDayDetailModal(currentDate);
          }
        }
      }
    }

    function toggleSubtaskComplete(taskId, subtaskId) {
      const task = state.tasks.find(t => t.id === taskId);
      if (task) {
        const subtask = task.subtasks.find(s => s.id === subtaskId);
        if (subtask) {
          subtask.completed = !subtask.completed;
          saveTasksLocal();
          saveTaskToSupabase(task);
          renderSubtaskSection(taskId);
          // Also re-render day detail modal if open
          const dayDetailModal = document.getElementById('dayDetailModal');
          if (dayDetailModal && !dayDetailModal.classList.contains('hidden')) {
            const currentDate = state.selectedDate;
            if (currentDate) {
              openDayDetailModal(currentDate);
            }
          }
        }
      }
    }

    function deleteSubtask(taskId, subtaskId) {
      const task = state.tasks.find(t => t.id === taskId);
      if (task) {
        task.subtasks = task.subtasks.filter(s => s.id !== subtaskId);
        saveTasksLocal();
        saveTaskToSupabase(task);
        renderSubtaskSection(taskId);
        // Also re-render day detail modal if open
        const dayDetailModal = document.getElementById('dayDetailModal');
        if (dayDetailModal && !dayDetailModal.classList.contains('hidden')) {
          const currentDate = state.selectedDate;
          if (currentDate) {
            openDayDetailModal(currentDate);
          }
        }
      }
    }

    function renderSubtaskSection(taskId) {
      const task = state.tasks.find(t => t.id === taskId);
      if (!task) return;

      const completedSubtasks = task.subtasks.filter(s => s.completed).length;
      const totalSubtasks = task.subtasks.length;
      const progressPercent = totalSubtasks > 0 ? (completedSubtasks / totalSubtasks) * 100 : 0;
      const today = formatDate(new Date());

      // Update progress bar in list view
      const taskEl = document.querySelector(`.list-task .task-checkbox[data-id="${taskId}"]`);
      if (taskEl) {
        const mainEl = taskEl.closest('.list-task');
        const progressEl = mainEl.querySelector('.task-subtasks-progress');
        if (progressEl) {
          progressEl.querySelector('span').textContent = `${completedSubtasks}/${totalSubtasks}`;
          const fill = progressEl.querySelector('.progress-fill');

        sectionEl.innerHTML = task.subtasks.map(st => {
          const stOverdue = !st.completed && st.dueDate && st.dueDate < today;

                  <div class="subtask-meta">

                      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>

            <select class="subtask-input" style="width: 110px; font-size: 12px; padding: 6px 8px;">
              <option value="urgent-important">紧急且重要</option>
              <option value="urgent">紧急不重要</option>
              <option value="important">不紧急重要</option>
              <option value="normal" selected>不紧急不重要</option>
            </select>

        if (wasHidden) {

        }
        // Re-bind input event
        const newInput = sectionEl.querySelector('.subtask-input[data-task-id]');
        if (newInput) {

          // Only focus if section is visible
          if (!wasHidden) {
            newInput.focus();

    function submitSubtask(taskId) {

    // ==================== Rendering ====================
    function render() {
      if (state.currentView === 'calendar') {
        renderCalendar();
      } else if (state.currentView === 'list') {
        renderList();
      } else if (state.currentView === 'matrix') {
        renderMatrix();
      }
    }

    function renderMatrix() {
      const tasks = state.tasks;
      
      // Collect all items (tasks and subtasks) by priority
      const items = {
        'urgent-important': [],
        'urgent': [],
        'important': [],
        'normal': []
      };
      
      // Add main tasks
      tasks.filter(t => !t.completed).forEach(task => {
        const priority = task.priority || 'normal';
        items[priority].push({
          type: 'task',
          id: task.id,
          content: task.content,
          dueDate: task.dueDate,
          completed: task.completed,
          parentId: null
        });
      });
      
      // Add subtasks
      tasks.forEach(task => {
        if (task.subtasks) {
          task.subtasks.filter(st => !st.completed).forEach(st => {
            const priority = st.priority || 'normal';
            items[priority].push({
              type: 'subtask',
              id: st.id,
              content: st.content,
              dueDate: st.dueDate,
              completed: st.completed,
              parentId: task.id,
              parentContent: task.content
            });
          });
        }
      });
      
      // Sort items in each quadrant by dueDate (ascending - nearest first)
      Object.keys(items).forEach(key => {
        items[key].sort((a, b) => {
          // Handle cases where dueDate might be null/undefined
          if (!a.dueDate && !b.dueDate) return 0;
          if (!a.dueDate) return 1;  // Items without dueDate go to the end
          if (!b.dueDate) return -1; // Items without dueDate go to the end
          return new Date(a.dueDate) - new Date(b.dueDate);
        });
      });
      
      // Update counts (tasks + subtasks)
      document.getElementById('quadrant1Count').textContent = items['urgent-important'].length;
      document.getElementById('quadrant2Count').textContent = items['urgent'].length;
      document.getElementById('quadrant3Count').textContent = items['important'].length;
      document.getElementById('quadrant4Count').textContent = items['normal'].length;
      
      // Render each quadrant
      renderQuadrantTasks('quadrant1Tasks', items['urgent-important']);
      renderQuadrantTasks('quadrant2Tasks', items['urgent']);
      renderQuadrantTasks('quadrant3Tasks', items['important']);
      renderQuadrantTasks('quadrant4Tasks', items['normal']);
    }

    function renderQuadrantTasks(elementId, items) {
      const container = document.getElementById(elementId);
      if (!container) return;
      
      if (items.length === 0) {
        container.innerHTML = '<div style="text-align: center; color: var(--text-muted); padding: 20px; font-size: 12px;">暂无任务</div>';
        return;
      }
      
      container.innerHTML = items.map(item => {
        if (item.type === 'task') {
          // Main task
          return `
            <div class="matrix-task-item ${item.completed ? 'completed' : ''}" onclick="openEditModal('${item.id}')">
              <div class="matrix-task-checkbox ${item.completed ? 'checked' : ''}" onclick="event.stopPropagation(); toggleTaskComplete('${item.id}')">
                ${item.completed ? '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>' : ''}
              </div>
              <span class="matrix-task-content">${escapeHtml(item.content)}</span>
              <span class="matrix-task-date">${formatDateLocale(item.dueDate)}</span>
            </div>
          `;
        } else {
          // Subtask - show with parent reference
          return `
            <div class="matrix-task-item subtask-item ${item.completed ? 'completed' : ''}" onclick="openEditModal('${item.parentId}')">
              <div class="matrix-task-checkbox ${item.completed ? 'checked' : ''}" onclick="event.stopPropagation(); toggleSubtaskComplete('${item.parentId}', '${item.id}')">
                ${item.completed ? '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>' : ''}
              </div>
              <span class="matrix-task-content">
                <span style="color: var(--text-muted); font-size: 10px;">[子]</span> ${escapeHtml(item.content)}
              </span>
              <span class="matrix-task-date">${item.dueDate ? formatDateLocale(item.dueDate) : ''}</span>
            </div>
          `;
        }
      }).join('');
    }

    function renderCalendar() {
      const year = state.currentMonth.getFullYear();
      const month = state.currentMonth.getMonth();

      document.getElementById('calendarTitle').textContent = `${year}年${month + 1}月`;

      const daysInMonth = getDaysInMonth(year, month);
      const firstDay = getFirstDayOfMonth(year, month);

      const daysContainer = document.getElementById('calendarDays');
      daysContainer.innerHTML = '';

      const today = new Date();

      // Previous month days
      const prevMonth = month === 0 ? 11 : month - 1;
      const prevYear = month === 0 ? year - 1 : year;
      const daysInPrevMonth = getDaysInMonth(prevYear, prevMonth);

      for (let i = firstDay - 1; i >= 0; i--) {
        const day = daysInPrevMonth - i;
        const dayStr = formatDate(new Date(prevYear, prevMonth, day));
        daysContainer.appendChild(createDayElement(day, dayStr, true, today));
      }

      // Current month days
      for (let day = 1; day <= daysInMonth; day++) {
        const dayStr = formatDate(new Date(year, month, day));
        daysContainer.appendChild(createDayElement(day, dayStr, false, today));
      }

      // Next month days
      const totalCells = firstDay + daysInMonth;
      const remainingCells = totalCells > 35 ? 42 - totalCells : 35 - totalCells;
      const nextMonth = month === 11 ? 0 : month + 1;
      const nextYear = month === 11 ? year + 1 : year;

      for (let day = 1; day <= remainingCells; day++) {
        const dayStr = formatDate(new Date(nextYear, nextMonth, day));
        daysContainer.appendChild(createDayElement(day, dayStr, true, today));
      }
    }

    function createDayElement(day, dateStr, isOtherMonth, today) {
      const div = document.createElement('div');
      div.className = 'calendar-day';

      if (isOtherMonth) {
        div.classList.add('other-month');
      }

      const isToday = dateStr === formatDate(today);
      if (isToday) {
        div.classList.add('today');
      }

      const dayNumber = document.createElement('div');
      dayNumber.className = 'day-number';
      dayNumber.textContent = day;
      div.appendChild(dayNumber);

      const tasksForDay = state.tasks.filter(t => t.dueDate === dateStr);
      // Also collect subtasks that have their own due date matching this day
      const subtasksForDay = [];
      state.tasks.forEach(task => {
        if (task.subtasks) {
          task.subtasks.forEach(st => {
            if (st.dueDate && st.dueDate === dateStr) {
              subtasksForDay.push({ subtask: st, parentTask: task });
            }
          });
        }
      });

      if (tasksForDay.length > 0 || subtasksForDay.length > 0) {
        const tasksContainer = document.createElement('div');
        tasksContainer.className = 'day-tasks';

        // Show main tasks (no limit)
        const displayTasks = tasksForDay;
        displayTasks.forEach(task => {
          const taskEl = document.createElement('div');
          taskEl.className = 'day-task-item priority-' + (task.priority || 'normal');

          if (task.completed) {
            taskEl.classList.add('completed');
          } else if (isOverdue(task.dueDate, task.dueTime) && !isToday) {
            taskEl.classList.add('overdue');
          } else if (isToday || isTodayOrBefore(task.dueDate)) {
            taskEl.classList.add('pending');
          }

          // Add checkbox for direct completion toggle
          const checkbox = document.createElement('div');
          checkbox.className = `day-task-checkbox ${task.completed ? 'checked' : ''}`;
          checkbox.innerHTML = task.completed ? '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>' : '';
          checkbox.onclick = (e) => {
            e.stopPropagation();
            toggleTaskComplete(task.id);
          };
          taskEl.appendChild(checkbox);

          // Task content
          const contentSpan = document.createElement('span');
          contentSpan.className = 'day-task-content';
          contentSpan.textContent = task.tag ? `${task.tag} · ${task.content}` : task.content;
          contentSpan.onclick = (e) => {
            e.stopPropagation();
            openDayDetailModal(dateStr);
          };
          taskEl.appendChild(contentSpan);

          tasksContainer.appendChild(taskEl);
        });

        // Show subtasks for this day (no limit)
        const displaySubtasks = subtasksForDay;
        displaySubtasks.forEach(({ subtask: st, parentTask: pt }) => {
          const stEl = document.createElement('div');
          stEl.className = 'day-task-item subtask-day-item priority-' + (st.priority || 'normal');

          if (st.completed) {
            stEl.classList.add('completed');
          }

          const checkbox = document.createElement('div');
          checkbox.className = `day-task-checkbox ${st.completed ? 'checked' : ''}`;
          checkbox.innerHTML = st.completed ? '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>' : '';
          checkbox.onclick = (e) => {
            e.stopPropagation();
            toggleSubtaskComplete(pt.id, st.id);
          };
          stEl.appendChild(checkbox);

          const contentSpan = document.createElement('span');
          contentSpan.className = 'day-task-content';
          contentSpan.textContent = st.content;
          contentSpan.onclick = (e) => {
            e.stopPropagation();
            openDayDetailModal(dateStr);
          };
          stEl.appendChild(contentSpan);

          tasksContainer.appendChild(stEl);
        });

        // No more badge needed since we show all tasks

        div.appendChild(tasksContainer);
      }

      div.onclick = () => openDayDetailModal(dateStr);

      return div;
    }

    function renderList() {
      const container = document.getElementById('listView');
      const today = formatDate(new Date());
      const tomorrow = formatDate(new Date(Date.now() + 86400000));

      const tasks = [...state.tasks];
      const incomplete = tasks.filter(t => !t.completed);
      const completed = tasks.filter(t => t.completed);

      // Sort incomplete by due date
      incomplete.sort((a, b) => {
        if (a.dueDate === b.dueDate) {
          if (a.dueTime && b.dueTime) return a.dueTime.localeCompare(b.dueTime);
          if (a.dueTime) return -1;
          if (b.dueTime) return 1;
          return 0;
        }
        return a.dueDate.localeCompare(b.dueDate);
      });

      // Sort completed by completed date
      completed.sort((a, b) => (b.completedAt || 0) - (a.completedAt || 0));

      // Collect all unique tags for filter
      const allTags = new Set();
      tasks.forEach(t => { if (t.tag) allTags.add(t.tag); });
      const tagsArr = [...allTags];

      // Build toolbar
      const currentFilter = state.listTagFilter || '';
      const subtasksExpanded = state.listSubtasksExpanded !== false; // default expanded
      let toolbarHtml = `<div class="list-toolbar">`;
      toolbarHtml += `<button class="list-toolbar-btn" onclick="toggleAllSubtasks()" id="toggleSubtasksBtn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 11 12 14 22 4"></polyline>
          <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
        </svg>
        <span id="toggleSubtasksText">${subtasksExpanded ? '收起子任务' : '展开子任务'}</span>
      </button>`;
      toolbarHtml += `<div class="list-toolbar-divider"></div>`;
      toolbarHtml += `<button class="list-toolbar-btn ${!currentFilter ? 'active' : ''}" onclick="filterListByTag('')">全部</button>`;
      tagsArr.forEach(tag => {
        toolbarHtml += `<button class="list-toolbar-btn ${currentFilter === tag ? 'active' : ''}" onclick="filterListByTag('${escapeHtml(tag)}')">${escapeHtml(tag)}</button>`;
      });
      toolbarHtml += `</div>`;

      // Filter tasks by tag
      const filteredTasks = currentFilter
        ? tasks.filter(t => t.tag === currentFilter)
        : tasks;
      const filteredIncomplete = filteredTasks.filter(t => !t.completed);
      const filteredCompleted = filteredTasks.filter(t => t.completed);

      // Re-sort filtered
      filteredIncomplete.sort((a, b) => {
        if (a.dueDate === b.dueDate) {
          if (a.dueTime && b.dueTime) return a.dueTime.localeCompare(b.dueTime);
          if (a.dueTime) return -1;
          if (b.dueTime) return 1;
          return 0;
        }
        return a.dueDate.localeCompare(b.dueDate);
      });
      filteredCompleted.sort((a, b) => (b.completedAt || 0) - (a.completedAt || 0));

      let html = toolbarHtml;

      // Overdue section
      const overdue = filteredIncomplete.filter(t => t.dueDate < today && !isToday(t.dueDate));
      if (overdue.length > 0) {
        html += renderListSection('已过期', overdue);
      }

      // Today section
      const todayTasks = filteredIncomplete.filter(t => isToday(t.dueDate));
      if (todayTasks.length > 0) {
        html += renderListSection('今天', todayTasks);
      }

      // Tomorrow section
      const tomorrowTasks = filteredIncomplete.filter(t => t.dueDate === tomorrow);
      if (tomorrowTasks.length > 0) {
        html += renderListSection('明天', tomorrowTasks);
      }

      // This week section
      const weekEnd = formatDate(new Date(Date.now() + 7 * 86400000));
      const thisWeek = filteredIncomplete.filter(t => t.dueDate > tomorrow && t.dueDate <= weekEnd);
      if (thisWeek.length > 0) {
        html += renderListSection('本周', thisWeek);
      }

      // Later section
      const later = filteredIncomplete.filter(t => t.dueDate > weekEnd);
      if (later.length > 0) {
        html += renderListSection('更晚', later);
      }

      // Completed section
      if (filteredCompleted.length > 0) {
        html += renderListSection('已完成', filteredCompleted);
      }

      if (html === toolbarHtml) {
        html += renderEmptyState();
      }

      // Remember subtask section visibility states before re-rendering
      const subtaskVisibility = {};
      container.querySelectorAll('.subtasks-section').forEach(el => {
        subtaskVisibility[el.id] = !el.classList.contains('hidden');
      });

      container.innerHTML = html;

      // Apply subtasks expanded/collapsed state
      if (state.listSubtasksExpanded === false) {
        container.querySelectorAll('.subtasks-section').forEach(el => {
          el.classList.add('hidden');
        });
      }

      // Bind events
      container.querySelectorAll('.task-checkbox').forEach(el => {
        el.onclick = () => toggleTaskComplete(el.dataset.id);
      });

      container.querySelectorAll('.subtask-checkbox').forEach(el => {
        el.onclick = () => toggleSubtaskComplete(el.dataset.taskId, el.dataset.id);
      });

      container.querySelectorAll('.edit-btn').forEach(el => {
        el.onclick = () => openEditModal(el.dataset.id);
      });

      container.querySelectorAll('.delete-btn').forEach(el => {
        el.onclick = () => {
          if (confirm('确定要删除这个任务吗？')) {
            deleteTask(el.dataset.id);
          }
        };
      });

      container.querySelectorAll('.postpone-btn').forEach(el => {
        el.onclick = () => openPostponeModal(el.dataset.id);
      });

      container.querySelectorAll('.add-subtask-btn').forEach(el => {
        el.onclick = () => showSubtaskInput(el.dataset.taskId);
      });

      container.querySelectorAll('.subtask-input').forEach(el => {
        if (el.type === 'text' || el.placeholder === '添加子任务...') {
          el.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && this.value.trim()) {
              e.preventDefault();
              const row = this.closest('.subtask-input-row');
              const dateInput = row.querySelector('.subtask-input[type="date"]');
              addSubtask(this.dataset.taskId, this.value.trim(), dateInput ? dateInput.value : '');
              this.value = '';
              if (dateInput) dateInput.value = '';
            }
          });
        }
      });
    }

    function renderListSection(title, tasks) {
      let html = `
        <div class="list-section">
          <div class="list-section-header">
            <h3 class="list-section-title">${title}</h3>
            <span class="list-section-count">${tasks.length}</span>
          </div>
      `;

      tasks.forEach(task => {
        html += renderListTask(task);
      });

      html += '</div>';
      return html;
    }

    function renderListTask(task) {

      const isOverdue = !task.completed && task.dueDate < today && !isToday(task.dueDate);

      const totalSubtasks = task.subtasks.length;
      const progressPercent = totalSubtasks > 0 ? (completedSubtasks / totalSubtasks) * 100 : 0;

      let classes = 'list-task';
      if (task.completed) classes += ' completed';
      if (isOverdue) classes += ' overdue';

      return `
        <div class="${classes}" data-tag="${escapeHtml(task.tag || '')}">
          <div class="task-checkbox ${task.completed ? 'checked' : ''}" data-id="${task.id}">

            ${totalSubtasks > 0 ? `

                  <polyline points="9 11 12 14 22 4"></polyline>

            <div class="subtasks-section" id="subtasks-${task.id}">

                    <div class="subtask-content-row">
                      <span class="subtask-text">${escapeHtml(st.content)}</span>
                      <div class="subtask-meta">
                        ${st.dueDate ? `<span class="subtask-due-date">
                          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="6"></line>
                            <line x1="8" y1="2" x2="8" y2="6"></line>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                          </svg>

                        </span>` : ''}
                        <span class="priority-tag ${st.priority || 'normal'}" style="font-size: 10px; padding: 1px 6px;">${getPriorityLabel(st.priority || 'normal')}</span>
                      </div>
                    </div>
                  </div>
                  <div class="subtask-actions">
                    <button class="subtask-action-btn delete" title="删除" onclick="deleteSubtask('${task.id}', '${st.id}')">
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                      </svg>

              `}).join('')}
              <div class="subtask-input-row">

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function getPriorityLabel(priority) {
      const labels = {
        'urgent-important': '紧急且重要',
        'urgent': '紧急不重要',
        'important': '不紧急重要',
        'normal': '不紧急不重要'
      };
      return labels[priority] || '不紧急不重要';
    }

    function showSubtaskInput(taskId) {
      const section = document.getElementById(`subtasks-${taskId}`);
      // Only focus input, don't change visibility - toggle button controls that
      const textInput = section.querySelector('.subtask-input[type="text"]');
      if (textInput) {
        textInput.focus();
      }
    }

    // ==================== Modal Functions ====================
    function openAddModal() {
      document.getElementById('modalTitle').textContent = '添加新任务';
      document.getElementById('taskId').value = '';
      document.getElementById('taskContent').value = '';
      document.getElementById('taskDueDate').value = '';
      document.getElementById('taskDueTime').value = '';
      document.getElementById('taskTag').value = '';

      // Populate tag suggestions from existing tags
      updateTagSuggestions();

      // Reset priority to normal
      const normalPriority = document.querySelector('input[name="taskPriority"][value="normal"]');
      if (normalPriority) {
        normalPriority.checked = true;
      }
      
      // Clear modal subtasks for new task
      state.modalSubtasks = [];
      renderModalSubtaskList();

      // Set default date to today
      const today = new Date();
      document.getElementById('taskDueDate').value = formatDate(today);
      document.getElementById('taskDueDate').min = formatDate(today);

      document.getElementById('taskModal').classList.remove('hidden');
      // Scroll to top to show modal
      window.scrollTo({top: 0, behavior: 'smooth'});
      document.getElementById('taskContent').focus();
    }

    // Open add modal with pre-filled date (used from day detail modal)
    function openAddModalWithDate(dateStr) {
      document.getElementById('modalTitle').textContent = '添加新任务';
      document.getElementById('taskId').value = '';
      document.getElementById('taskContent').value = '';
      document.getElementById('taskDueDate').value = dateStr;
      document.getElementById('taskDueTime').value = '';
      document.getElementById('taskTag').value = '';

      // Populate tag suggestions from existing tags
      updateTagSuggestions();
      
      // Clear modal subtasks for new task
      state.modalSubtasks = [];
      renderModalSubtaskList();

      // Set min date to today
      const today = new Date();
      document.getElementById('taskDueDate').min = formatDate(today);

      document.getElementById('taskModal').classList.remove('hidden');
      // Scroll to top to show modal
      window.scrollTo({top: 0, behavior: 'smooth'});
      document.getElementById('taskContent').focus();
    }

    // Render subtask list in modal

      }
      
      list.innerHTML = state.modalSubtasks.map((st, index) => `
        <div class="modal-subtask-item">
          <span class="modal-subtask-item-text">${escapeHtml(st.content)}</span>
          ${st.priority ? `<span class="priority-tag ${st.priority}" style="font-size: 10px; padding: 1px 4px;">${getPriorityLabel(st.priority)}</span>` : ''}
          ${st.dueDate ? `<span class="modal-subtask-item-date">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            ${formatDateLocale(st.dueDate)}
          </span>` : ''}
          <button type="button" class="modal-subtask-item-edit" onclick="editModalSubtask(${index})" title="编辑">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
            </svg>
          </button>
          <button type="button" class="modal-subtask-item-postpone" onclick="postponeModalSubtask(${index})" title="延期">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
          </button>
          <button type="button" class="modal-subtask-item-delete" onclick="removeModalSubtask(${index})" title="删除">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
      `).join('');
    }

    // State for subtask editing
    state.editingSubtaskIndex = -1;
    state.editingSubtaskPriority = 'normal';

    // Edit subtask in modal - open edit popup
    function editModalSubtask(index) {
      const st = state.modalSubtasks[index];
      if (!st) return;

      state.editingSubtaskIndex = index;
      state.editingSubtaskPriority = st.priority || 'normal';

      document.getElementById('subtaskEditContent').value = st.content || '';
      document.getElementById('subtaskEditDate').value = st.dueDate || '';

      // Highlight current priority
      document.querySelectorAll('.subtask-edit-priority-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.priority === state.editingSubtaskPriority);
      });

      document.getElementById('subtaskEditModal').classList.remove('hidden');
      document.getElementById('subtaskEditContent').focus();
    }

    function selectSubtaskEditPriority(priority) {
      state.editingSubtaskPriority = priority;
      document.querySelectorAll('.subtask-edit-priority-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.priority === priority);
      });
    }

    function saveSubtaskEdit() {
      const index = state.editingSubtaskIndex;
      if (index < 0) return;

      const st = state.modalSubtasks[index];
      if (!st) return;

      const newContent = document.getElementById('subtaskEditContent').value.trim();
      if (!newContent) return;

      st.content = newContent;
      st.dueDate = document.getElementById('subtaskEditDate').value || '';
      st.priority = state.editingSubtaskPriority;

      closeSubtaskEditModal();
      renderModalSubtaskList();
    }

    function closeSubtaskEditModal() {
      document.getElementById('subtaskEditModal').classList.add('hidden');
      state.editingSubtaskIndex = -1;
    }

    // State for direct subtask editing (from day detail modal)
    state.directEditingSubtask = null; // { taskId, subtaskId }

    function editSubtaskDirect(taskId, subtaskId) {
      const task = state.tasks.find(t => t.id === taskId);
      if (!task) return;
      const st = task.subtasks.find(s => s.id === subtaskId);
      if (!st) return;

      state.directEditingSubtask = { taskId, subtaskId };
      state.editingSubtaskPriority = st.priority || 'normal';

      document.getElementById('subtaskEditContent').value = st.content || '';
      document.getElementById('subtaskEditDate').value = st.dueDate || '';

      document.querySelectorAll('.subtask-edit-priority-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.priority === state.editingSubtaskPriority);
      });

      document.getElementById('subtaskEditModal').classList.remove('hidden');
      document.getElementById('subtaskEditContent').focus();
    }

    function saveSubtaskEdit() {
      const index = state.editingSubtaskIndex;
      const directEdit = state.directEditingSubtask;

      if (index >= 0) {
        // Editing from modalSubtasks
        const st = state.modalSubtasks[index];
        if (!st) return;

        const newContent = document.getElementById('subtaskEditContent').value.trim();
        if (!newContent) return;

        st.content = newContent;
        st.dueDate = document.getElementById('subtaskEditDate').value || '';
        st.priority = state.editingSubtaskPriority;

        closeSubtaskEditModal();
        renderModalSubtaskList();
      } else if (directEdit) {
        // Editing directly from day detail
        const task = state.tasks.find(t => t.id === directEdit.taskId);
        if (!task) return;
        const st = task.subtasks.find(s => s.id === directEdit.subtaskId);
        if (!st) return;

        const newContent = document.getElementById('subtaskEditContent').value.trim();
        if (!newContent) return;

        st.content = newContent;
        st.dueDate = document.getElementById('subtaskEditDate').value || '';
        st.priority = state.editingSubtaskPriority;

        saveTasksLocal();
        saveTaskToSupabase(task);
        closeSubtaskEditModal();
        openDayDetailModal(state.selectedDate);
      }
    }

    function closeSubtaskEditModal() {
      document.getElementById('subtaskEditModal').classList.add('hidden');
      state.editingSubtaskIndex = -1;
      state.directEditingSubtask = null;
    }

    // State for direct subtask postponing (from day detail modal)
    state.directPostponingSubtask = null; // { taskId, subtaskId }

    function postponeSubtaskDirect(taskId, subtaskId) {
      const task = state.tasks.find(t => t.id === taskId);
      if (!task) return;
      const st = task.subtasks.find(s => s.id === subtaskId);
      if (!st) return;

      state.directPostponingSubtask = { taskId, subtaskId };

      document.getElementById('subtaskPostponeName').textContent = st.content || '未命名子任务';
      const currentDue = st.dueDate || '未设置';
      document.getElementById('subtaskCurrentDueDate').textContent = currentDue === '未设置' ? '未设置' : formatDateLocale(st.dueDate);
      document.getElementById('subtaskNewDueDate').value = st.dueDate || '';

      document.getElementById('subtaskPostponeModal').classList.remove('hidden');
    }

    function confirmSubtaskPostpone() {
      const index = state.postponingSubtaskIndex;
      const directPostpone = state.directPostponingSubtask;

      if (index >= 0) {
        // Postponing from modalSubtasks
        const st = state.modalSubtasks[index];
        if (!st) return;

        const newDate = document.getElementById('subtaskNewDueDate').value;
        if (!newDate) return;

        st.dueDate = newDate;
        st.postponeCount = (st.postponeCount || 0) + 1;
        closeSubtaskPostponeModal();
        renderModalSubtaskList();
      } else if (directPostpone) {
        // Postponing directly from day detail
        const task = state.tasks.find(t => t.id === directPostpone.taskId);
        if (!task) return;
        const st = task.subtasks.find(s => s.id === directPostpone.subtaskId);
        if (!st) return;

        const newDate = document.getElementById('subtaskNewDueDate').value;
        if (!newDate) return;

        st.dueDate = newDate;
        st.postponeCount = (st.postponeCount || 0) + 1;

        saveTasksLocal();
        saveTaskToSupabase(task);
        closeSubtaskPostponeModal();
        openDayDetailModal(state.selectedDate);
      }
    }

    function closeSubtaskPostponeModal() {
      document.getElementById('subtaskPostponeModal').classList.add('hidden');
      state.postponingSubtaskIndex = -1;
      state.directPostponingSubtask = null;
    }

    // Add subtask from modal input
    function addSubtaskFromModal() {
      const input = document.getElementById('modalSubtaskInput');
      const dateInput = document.getElementById('modalSubtaskDate');
      const prioritySelect = document.getElementById('modalSubtaskPriority');
      if (!input || !input.value.trim()) return;
      
      state.modalSubtasks.push({
        id: generateId(),
        content: input.value.trim(),
        dueDate: dateInput ? dateInput.value : '',
        completed: false,
        priority: prioritySelect ? prioritySelect.value : 'normal'
      });
      
      input.value = '';
      if (dateInput) dateInput.value = '';
      renderModalSubtaskList();
    }

    // Remove subtask from modal
    function removeModalSubtask(index) {
      state.modalSubtasks.splice(index, 1);
      renderModalSubtaskList();
    }

    function openEditModal(taskId) {
      const task = state.tasks.find(t => t.id === taskId);
      if (!task) return;

      // Close day detail modal if open to avoid z-index overlap
      document.getElementById('dayDetailModal').classList.add('hidden');

      document.getElementById('modalTitle').textContent = '编辑任务';
      document.getElementById('taskId').value = task.id;
      document.getElementById('taskContent').value = task.content;
      document.getElementById('taskDueDate').value = task.dueDate;
      document.getElementById('taskDueTime').value = task.dueTime || '';
      document.getElementById('taskTag').value = task.tag || '';

      // Populate tag suggestions from existing tags
      updateTagSuggestions();

      // Load existing priority
      const priority = task.priority || 'normal';
      const priorityRadio = document.querySelector(`input[name="taskPriority"][value="${priority}"]`);
      if (priorityRadio) {
        priorityRadio.checked = true;
      }

      // Load existing subtasks into modal subtask list
      state.modalSubtasks = task.subtasks ? [...task.subtasks] : [];
      renderModalSubtaskList();

      const today = new Date();
      document.getElementById('taskDueDate').min = formatDate(today);

      document.getElementById('taskModal').classList.remove('hidden');
      document.getElementById('taskContent').focus();
    }

    function closeTaskModal() {
      document.getElementById('taskModal').classList.add('hidden');
    }

    function openPostponeModal(taskId) {
      const task = state.tasks.find(t => t.id === taskId);
      if (!task) return;

      // Close day detail modal if open to avoid z-index overlap
      document.getElementById('dayDetailModal').classList.add('hidden');

      state.selectedTaskId = taskId;
      document.getElementById('currentDueDate').textContent = formatDateLocale(task.dueDate);
      document.getElementById('postponeCount').textContent = task.postponeCount;
      document.getElementById('newDueDate').value = task.dueDate;

      // Allow any future date
      document.getElementById('newDueDate').min = formatDate(new Date());

      document.getElementById('postponeModal').classList.remove('hidden');
    }

    function closePostponeModal() {
      document.getElementById('postponeModal').classList.add('hidden');
      state.selectedTaskId = null;
    }

    function openDayDetailModal(dateStr) {
      state.selectedDate = dateStr;
      const tasks = state.tasks.filter(t => t.dueDate === dateStr);
      const date = new Date(dateStr);
      const today = formatDate(new Date());
      const isToday = dateStr === today;

      // Also collect subtasks whose own due date matches this day (parent task may be on a different date)
      const independentSubtasks = [];
      state.tasks.forEach(task => {
        if (task.subtasks) {
          task.subtasks.forEach(st => {
            if (st.dueDate && st.dueDate === dateStr && task.dueDate !== dateStr) {
              independentSubtasks.push({ subtask: st, parentTask: task });
            }
          });
        }
      });

      const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
      document.getElementById('dayDetailDate').textContent =
        `${date.getMonth() + 1}月${date.getDate()}日 ${weekdays[date.getDay()]}${isToday ? ' (今天)' : ''}`;
      const totalItemCount = tasks.length + independentSubtasks.length;
      document.getElementById('dayDetailCount').textContent = `${totalItemCount} 个任务`;

      const body = document.getElementById('dayDetailBody');

      // Calculate statistics (only count subtasks that belong to this day - no dueDate or dueDate === dateStr)
      const completedCount = tasks.filter(t => t.completed).length;
      const incompleteCount = tasks.length - completedCount;
      const totalSubtasks = tasks.reduce((sum, t) => sum + t.subtasks.filter(s => !s.dueDate || s.dueDate === dateStr).length, 0);
      const completedSubtasks = tasks.reduce((sum, t) => sum + t.subtasks.filter(s => (!s.dueDate || s.dueDate === dateStr) && s.completed).length, 0);
      const indCompletedSubtasks = independentSubtasks.filter(({ subtask: st }) => st.completed).length;
      const indTotalSubtasks = independentSubtasks.length;
      const allSubtasks = totalSubtasks + indTotalSubtasks;
      const allCompletedSubtasks = completedSubtasks + indCompletedSubtasks;

      if (tasks.length === 0 && independentSubtasks.length === 0) {
        body.innerHTML = `
          <div class="day-detail-empty">
            <div class="day-detail-empty-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
              </svg>
            </div>
            <div>这一天还没有任务</div>
            <button class="day-detail-add-btn" onclick="closeDayDetailModal();openAddModalWithDate('${dateStr}')">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
              添加任务
            </button>
          </div>
        `;
      } else {
        let summaryHtml = `
          <div class="day-detail-summary">
            <div class="day-detail-stat">
              <span class="day-detail-stat-number">${completedCount}/${tasks.length}</span>
              <span>主任务</span>
            </div>
            ${allSubtasks > 0 ? `
            <div class="day-detail-stat">
              <span class="day-detail-stat-number" style="color: var(--accent);">${allCompletedSubtasks}/${allSubtasks}</span>
              <span>子任务</span>
            </div>
            ` : ''}
            <button class="day-detail-add-btn" onclick="closeDayDetailModal();openAddModalWithDate('${dateStr}')">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
              添加任务
            </button>
          </div>
        `;
        body.innerHTML = summaryHtml + tasks.map(task => {
          const daySubtasks = task.subtasks.filter(s => !s.dueDate || s.dueDate === dateStr);
          const completedSubtasks = daySubtasks.filter(s => s.completed).length;
          const totalSubtasks = daySubtasks.length;

          return `
            <div class="list-task ${task.completed ? 'completed' : ''}" style="margin-bottom: 12px;">
              <div class="task-checkbox ${task.completed ? 'checked' : ''}" data-id="${task.id}" onclick="toggleTaskComplete('${task.id}')">
                ${task.completed ? `
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                  </svg>
                ` : ''}
              </div>
              <div class="task-main">
                <div class="task-content-row">
                  <span class="task-content-text">${escapeHtml(task.content)}</span>
                  ${task.tag ? `<span class="task-tag category-tag">${escapeHtml(task.tag)}</span>` : ''}
                  ${task.priority ? `<span class="priority-tag ${task.priority}">${getPriorityLabel(task.priority)}</span>` : `<span class="priority-tag normal">${getPriorityLabel('normal')}</span>`}
                  ${task.postponeCount > 0 ? `<span class="task-tag postpone-tag">延期 ${task.postponeCount} 次</span>` : ''}
                  ${totalSubtasks > 0 ? `<span class="task-tag subtask-count-tag">${completedSubtasks}/${totalSubtasks}</span>` : ''}
                </div>
                <div class="subtasks-section" id="subtasks-${task.id}" style="margin-top: 12px;">
                  ${task.subtasks.filter(st => !st.dueDate || st.dueDate === dateStr).map(st => {
                    const stOverdue = !st.completed && st.dueDate && st.dueDate < today;
                    return `
                    <div class="subtask-item ${st.completed ? 'completed' : ''}">
                      <div class="subtask-checkbox ${st.completed ? 'checked' : ''}" onclick="toggleSubtaskComplete('${task.id}', '${st.id}')">
                        ${st.completed ? `
                          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                            <polyline points="20 6 9 17 4 12"></polyline>
                          </svg>
                        ` : ''}
                      </div>
                      <div class="subtask-item-main">
                        <div class="subtask-content-row" style="display: flex; align-items: center; gap: 6px; flex-wrap: wrap;">
                          <span class="subtask-text" style="flex: 1; min-width: 0;">${escapeHtml(st.content)}</span>
                          <span class="subtask-meta-date" style="flex-shrink: 0; width: 70px; text-align: center;">${st.dueDate ? `<span class="subtask-due-date ${stOverdue ? 'overdue' : ''}" style="display: inline-flex; align-items: center; gap: 2px;">
                            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                              <line x1="16" y1="2" x2="16" y2="6"></line>
                              <line x1="8" y1="2" x2="8" y2="6"></line>
                              <line x1="3" y1="10" x2="21" y2="10"></line>
                            </svg>
                            ${formatDateLocale(st.dueDate)}
                          </span>` : ''}</span>
                          <span class="subtask-meta-priority" style="flex-shrink: 0; width: 72px; text-align: center;">${st.priority ? `<span class="priority-tag ${st.priority}" style="font-size: 10px; padding: 1px 4px;">${getPriorityLabel(st.priority)}</span>` : ''}</span>
                        </div>
                      </div>
                      <div class="subtask-actions">
                        <button class="subtask-action-btn delete" title="删除" onclick="deleteSubtask('${task.id}', '${st.id}')">
                          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                          </svg>
                        </button>
                      </div>
                    </div>
                  `}).join('')}
                  <div class="subtask-input-row" style="margin-top: 8px;">
                    <input type="date" class="subtask-input" style="width: 100px; font-size: 12px; padding: 6px 8px;" title="子任务到期日期">
                    <select class="subtask-input" style="width: 110px; font-size: 12px; padding: 6px 8px;">
                      <option value="urgent-important">紧急且重要</option>
                      <option value="urgent">紧急不重要</option>
                      <option value="important">不紧急重要</option>
                      <option value="normal" selected>不紧急不重要</option>
                    </select>
                    <input type="text" class="subtask-input" placeholder="添加子任务..." onkeydown="if(event.key==='Enter' && this.value.trim()){event.preventDefault();const row=this.closest('.subtask-input-row');const d=row.querySelector('input[type=\'date\']');const p=row.querySelector('select');addSubtask('${task.id}', this.value.trim(), d?d.value:'', p?p.value:'normal');this.value='';if(d)d.value='';}">
                    <button class="subtask-add-btn" onclick="submitSubtaskFromModal('${task.id}')">
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                      </svg>
                    </button>
                  </div>
                </div>
              </div>
              <div class="task-actions" style="opacity: 1;">
                <button class="action-btn postpone-btn" onclick="openPostponeModal('${task.id}')" title="延期">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                  </svg>
                </button>
                <button class="action-btn edit-btn" onclick="openEditModal('${task.id}')" title="编辑">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                  </svg>
                </button>
                <button class="action-btn delete" onclick="if(confirm('确定要删除这个任务吗？')){deleteTask('${task.id}');closeDayDetailModal();}" title="删除">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                  </svg>
                </button>
              </div>
            </div>
          `;
        }).join('');

        // Render independent subtasks (whose due date is today but parent task is on a different date)
        if (independentSubtasks.length > 0) {
          // Group by parent task
          const grouped = {};
          independentSubtasks.forEach(({ subtask: st, parentTask: pt }) => {
            if (!grouped[pt.id]) grouped[pt.id] = { parentTask: pt, subtasks: [] };
            grouped[pt.id].subtasks.push(st);
          });

          let subtaskHtml = '';
          Object.values(grouped).forEach(({ parentTask: pt, subtasks: sts }) => {
            subtaskHtml += `
              <div style="margin-bottom: 12px;">
                <div style="font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; display: flex; align-items: center; gap: 6px;">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                  </svg>
                  ${escapeHtml(pt.content)}
                </div>
                ${sts.map(st => {
                  const stOverdue = !st.completed && st.dueDate && st.dueDate < today;
                  return `
                  <div class="subtask-item ${st.completed ? 'completed' : ''}" style="margin-bottom: 4px;">
                    <div class="subtask-checkbox ${st.completed ? 'checked' : ''}" onclick="toggleSubtaskComplete('${pt.id}', '${st.id}')">
                      ${st.completed ? `
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                          <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                      ` : ''}
                    </div>
                    <div class="subtask-item-main">
                      <div class="subtask-content-row" style="display: flex; align-items: center; gap: 6px; flex-wrap: wrap;">
                        <span class="subtask-text" style="flex: 1; min-width: 0;">${escapeHtml(st.content)}</span>
                        <span class="subtask-meta-date" style="flex-shrink: 0; width: 70px; text-align: center;">${st.dueDate ? `<span class="subtask-due-date ${stOverdue ? 'overdue' : ''}" style="display: inline-flex; align-items: center; gap: 2px;">
                          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="6"></line>
                            <line x1="8" y1="2" x2="8" y2="6"></line>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                          </svg>
                          ${formatDateLocale(st.dueDate)}
                        </span>` : ''}</span>
                        <span class="subtask-meta-priority" style="flex-shrink: 0; width: 72px; text-align: center;">${st.priority ? `<span class="priority-tag ${st.priority}" style="font-size: 10px; padding: 1px 4px;">${getPriorityLabel(st.priority)}</span>` : ''}</span>
                        ${st.postponeCount > 0 ? `<span style="flex-shrink: 0; font-size: 10px; color: var(--warning);">延期 ${st.postponeCount} 次</span>` : ''}
                      </div>
                    </div>
                    <div class="subtask-actions">
                      <button class="subtask-action-btn" title="编辑" onclick="editSubtaskDirect('${pt.id}', '${st.id}'); event.stopPropagation();">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                        </svg>
                      </button>
                      <button class="subtask-action-btn" title="延期" onclick="postponeSubtaskDirect('${pt.id}', '${st.id}'); event.stopPropagation();">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                          <circle cx="12" cy="12" r="10"></circle>
                          <polyline points="12 6 12 12 16 14"></polyline>
                        </svg>
                      </button>
                    </div>
                  </div>`;
                }).join('')}
              </div>
            `;
          });

          body.innerHTML += `
            <div style="margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--border);">
              ${subtaskHtml}
            </div>
          `;
        }
      }

      document.getElementById('dayDetailModal').classList.remove('hidden');
    }

    function closeDayDetailModal() {
      document.getElementById('dayDetailModal').classList.add('hidden');
      state.selectedDate = null;
    }

    // ==================== Event Listeners ====================
    document.getElementById('addTaskBtn').onclick = openAddModal;
    document.getElementById('closeTaskModal').onclick = closeTaskModal;
    document.getElementById('cancelTask').onclick = closeTaskModal;

    document.getElementById('closePostponeModal').onclick = closePostponeModal;
    document.getElementById('cancelPostpone').onclick = closePostponeModal;

    document.getElementById('closeDayDetailModal').onclick = closeDayDetailModal;

    // Modal subtask input Enter key
    const modalSubtaskInput = document.getElementById('modalSubtaskInput');
    if (modalSubtaskInput) {
      modalSubtaskInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          addSubtaskFromModal();
        }
      });
    }

    // View tabs
    document.querySelectorAll('.view-tab').forEach(tab => {
      tab.onclick = () => {
        document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        state.currentView = tab.dataset.view;

        document.getElementById('calendarView').classList.toggle('hidden', state.currentView !== 'calendar');
        document.getElementById('listView').classList.toggle('hidden', state.currentView !== 'list');
        document.getElementById('matrixView').classList.toggle('hidden', state.currentView !== 'matrix');

        render();
      };
    });

    // Calendar navigation
    document.getElementById('prevMonth').onclick = () => {
      state.currentMonth.setMonth(state.currentMonth.getMonth() - 1);
      renderCalendar();
    };

    document.getElementById('nextMonth').onclick = () => {
      state.currentMonth.setMonth(state.currentMonth.getMonth() + 1);
      renderCalendar();
    };

    document.getElementById('todayBtn').onclick = () => {
      state.currentMonth = new Date();
      renderCalendar();
    };

    // Task form
    document.getElementById('saveTask').onclick = () => {
      const id = document.getElementById('taskId').value;
      const content = document.getElementById('taskContent').value.trim();
      const dueDate = document.getElementById('taskDueDate').value;
      const dueTime = document.getElementById('taskDueTime').value;

      if (!content || !dueDate) {
        alert('请填写任务内容和到期日期');
        return;
      }

      // Get priority from radio buttons
      const priorityEl = document.querySelector('input[name="taskPriority"]:checked');
      const priority = priorityEl ? priorityEl.value : 'normal';

      // Get subtasks from modal (for both new and edit)
      const subtasks = [...state.modalSubtasks];

      // Get category tag
      const tag = document.getElementById('taskTag').value.trim();

      if (id) {
        updateTask(id, content, dueDate, dueTime, subtasks, priority, tag);
      } else {
        addTask(content, dueDate, dueTime, subtasks, priority, tag);
      }

      // Clear modal subtasks after saving
      state.modalSubtasks = [];
      closeTaskModal();
    };

    // Postpone form
    document.getElementById('confirmPostpone').onclick = () => {
      const newDate = document.getElementById('newDueDate').value;
      if (!newDate) {
        alert('请选择新的到期日期');
        return;
      }

      postponeTask(state.selectedTaskId, newDate);
      closePostponeModal();
    };

    // Close modals on overlay click
    document.querySelectorAll('.modal-overlay').forEach(overlay => {
      overlay.onclick = (e) => {
        if (e.target === overlay) {
          overlay.classList.add('hidden');
        }
      };
    });

    // Keyboard shortcuts
    document.onkeydown = (e) => {
      if (e.key === 'Escape') {
        document.querySelectorAll('.modal-overlay').forEach(m => m.classList.add('hidden'));
      }
    };

    // ==================== Initialize ====================
    async function init() {
      // Load local tasks first
      loadTasksLocal();
      loadLastSyncTime();

      // Render initial view
      render();

      // Initialize Supabase
      await initSupabase();

      // Open auth modal on first load (only if not logged in)
      setTimeout(() => {
        const isLoggedIn = localStorage.getItem('todomaster_logged_in');
        if (!isLoggedIn && !currentUser) {
          openAuthModal();
        }
      }, 500);

      // 定期同步待同步任务（每30秒）
      setInterval(() => {
        if (currentUser && supabaseClient) {
          syncPendingTasks();
        }
      }, 30000);

      // 网络恢复时自动同步
      window.addEventListener('online', () => {
        addDebugLog('网络已恢复，开始同步待同步任务');
        showToast('网络已恢复，正在同步数据...');
        if (currentUser && supabaseClient) {
          syncPendingTasks();
        }
      });

      // 页面重新可见时同步（比如从后台切回）
      document.addEventListener('visibilitychange', () => {
        if (!document.hidden && currentUser && supabaseClient) {
          addDebugLog('页面重新可见，检查待同步任务');
          syncPendingTasks();
        }
      });

      // 页面加载完成后立即尝试同步
      if (pendingSyncTasks.length > 0) {
        addDebugLog('页面加载时发现 ' + pendingSyncTasks.length + ' 个待同步任务');
      }
    }

    init();
  </script>
  
  <!-- Debug Panel -->
  <div id="debugPanel" style="position: fixed; bottom: 10px; left: 10px; right: 10px; max-height: 200px; background: rgba(0,0,0,0.9); color: #0f0; font-family: monospace; font-size: 12px; padding: 10px; border-radius: 8px; overflow-y: auto; z-index: 9999; display: none;">
    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
      <strong style="color: #fff;">调试日志</strong>
      <button onclick="document.getElementById('debugPanel').style.display='none'" style="background: #666; color: #fff; border: none; padding: 2px 8px; border-radius: 4px; cursor: pointer;">关闭</button>
    </div>
    <div id="debugLogs"></div>
  </div>
  
  <!-- Debug toggle button -->
  <button id="debugToggle" onclick="toggleDebugPanel()" style="position: fixed; bottom: 10px; right: 10px; background: #666; color: #fff; border: none; padding: 8px 12px; border-radius: 20px; font-size: 12px; z-index: 9998; cursor: pointer; opacity: 0.7;">调试</button>
</body>
</html>
